<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#101820">
    <title>Lift Ledger</title>
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <header class="app-header">
      <div>
        <p class="eyebrow">Beginner transformation tracker</p>
        <h1>Lift Ledger</h1>
      </div>
      <div class="header-actions">
        <button id="installBtn" class="icon-btn" hidden title="Install app" aria-label="Install app">+</button>
        <button id="importBtn" class="icon-btn" title="Import workout data" aria-label="Import workout data">IN</button>
        <button id="exportBtn" class="icon-btn" title="Export workout data" aria-label="Export workout data">OUT</button>
        <input id="importFile" type="file" accept="application/json,.json" hidden>
      </div>
    </header>

    <main>
      <section class="controls-band">
        <label>
          <span>Week</span>
          <select id="weekSelect"></select>
        </label>
        <label>
          <span>Workout</span>
          <select id="daySelect"></select>
        </label>
      </section>

      <section class="today-panel">
        <div>
          <p class="eyebrow" id="blockLabel">This week</p>
          <h2 id="todayTitle">Loading</h2>
          <p id="todaySummary"></p>
        </div>
        <div class="score-ring">
          <canvas id="completionChart" width="132" height="132"></canvas>
          <strong id="completionValue">0%</strong>
        </div>
      </section>

      <section class="insight-grid">
        <article>
          <span>Next target</span>
          <strong id="nextTarget">Log your first set</strong>
        </article>
        <article>
          <span>Weekly volume</span>
          <strong id="volumeMetric">0 lb</strong>
        </article>
        <article>
          <span>Rep improvement</span>
          <strong id="repMetric">0 reps</strong>
        </article>
      </section>

      <section class="charts">
        <div>
          <div class="section-heading">
            <h2>Volume Trend</h2>
            <span id="volumeHint">Last 8 logged weeks</span>
          </div>
          <canvas id="volumeChart" height="170"></canvas>
        </div>
        <div>
          <div class="section-heading">
            <h2>Exercise Trend</h2>
            <select id="exerciseTrendSelect"></select>
          </div>
          <canvas id="exerciseChart" height="170"></canvas>
        </div>
      </section>

      <section>
        <div class="section-heading">
          <h2 id="workoutHeading">Workout</h2>
          <button id="markDoneBtn" class="ghost-btn">Mark Day Done</button>
        </div>
        <div id="exerciseList" class="exercise-list"></div>
      </section>
    </main>

    <template id="exerciseTemplate">
      <article class="exercise-card">
        <button class="exercise-main" type="button">
          <span class="exercise-index"></span>
          <span>
            <strong class="exercise-name"></strong>
            <small class="exercise-prescription"></small>
          </span>
          <span class="target-pill"></span>
        </button>
        <div class="exercise-detail">
          <div class="detail-grid">
            <span><b>Rest</b><em class="rest"></em></span>
            <span><b>RPE</b><em class="rpe"></em></span>
            <span><b>Warm-up</b><em class="warmups"></em></span>
          </div>
          <div class="progress-box">
            <span class="previous-summary"></span>
            <strong class="target-summary"></strong>
          </div>
          <p class="notes"></p>
          <div class="sets"></div>
          <label class="note-field">
            <span>Session notes</span>
            <textarea rows="2" placeholder="Pain, substitutions, form cues"></textarea>
          </label>
        </div>
      </article>
    </template>

    <script src="program-data.js"></script>
    <script src="app.js"></script>
  </body>
</html>
